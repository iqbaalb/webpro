<!DOCTYPE html>
<html>

<head>
    <title>Formulir Pendaftaran Praktikan</title>

    <style>
        body {
            font-family: Arial;
            background-image: url("https://akcdn.detik.net.id/visual/2025/10/28/setahun-kepemimpinan-prabowo-gibran-pembangunan-ikn-terus-maju-pemerintah-siapkan-rp488-t-dan-targetkan-nusantara-jadi-ibu-kot-1761651228566_169.jpeg?w=900&q=80");
            background-size: cover;
        }

        .form-container {
            width: 400px;
            background: white;
            padding: 20px;
            margin: 80px auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            text-align: center;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .radio-group,
        .checkbox-group {
            display: flex;
            gap: 15px;
        }

        .checkbox-group {
            flex-direction: column;
        }

        input[type="radio"],
        input[type="checkbox"] {
            width: auto;
        }

        .button-group {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
        }

        button {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .submit {
            background-color: green;
            color: white;
        }

        .cancel {
            background-color: red;
            color: white;
        }
    </style>
</head>

<body>

    <div class="form-container">

        <h2>Formulir Pendaftaran Praktikan</h2>

        <form>

            <div class="form-group">
                <label>Nama :</label>
                <input type="text" placeholder="Iqbal Bawani ">
            </div>

            <div class="form-group">
                <label>NIM :</label>
                <input type="text" placeholder="2311102130">
            </div>

            <div class="form-group">
                <label>Username :</label>
                <input type="text" value="Praktikum">
            </div>

            <div class="form-group">
                <label>Password :</label>
                <input type="password" placeholder="Input Password">
            </div>

            <div class="form-group">
                <label>Email :</label>
                <input type="email" placeholder="Input Email">
            </div>

            <div class="form-group">
                <label>Jenis Kelamin :</label>
                <div class="radio-group">
                    <label><input type="radio" name="jk"> Pria</label>
                    <label><input type="radio" name="jk"> Wanita</label>
                </div>
            </div>

            <div class="form-group">
                <label>Hobi :</label>
                <div class="checkbox-group">
                    <label><input type="checkbox"> Renang</label>
                    <label><input type="checkbox"> Bersepeda</label>
                    <label><input type="checkbox"> Memancing</label>
                </div>
            </div>

            <div class="form-group">
                <label>Jenjang Pendidikan :</label>
                <select>
                    <option>----Pilih----</option>
                    <option>Tamat D3</option>
                    <option>Tamat S1</option>
                    <option>Tamat S2</option>
                    <option>Tamat S3</option>
                </select>
            </div>

            <div class="form-group">
                <label>Kritik & Saran :</label>
                <textarea rows="4"></textarea>
            </div>

            <div class="button-group">
                <button class="cancel">Cancel</button>
                <button class="submit">Submit</button>
            </div>

        </form>

    </div>

</body>

</html>
